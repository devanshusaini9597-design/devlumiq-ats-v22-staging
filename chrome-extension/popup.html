<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 16px 0;
      color: #111827;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0d9488;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #0f766e;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }
    .status.success {
      background: #d1fae5;
      color: #065f46;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }
    .info {
      font-size: 11px;
      color: #6b7280;
      margin-top: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>ATS LinkedIn Import</h1>
  
  <div class="form-group">
    <label>API Key</label>
    <input type="text" id="apiKey" placeholder="Enter your ATS API key">
  </div>
  
  <button id="saveBtn">Save Settings</button>
  
  <div id="status" class="status" style="display: none;"></div>
  
  <p class="info">
    Visit any LinkedIn profile and click "Import to ATS" to add candidates directly to your system.
  </p>

  <script>
    // Load saved settings
    chrome.storage.sync.get(['atsApiKey'], (result) => {
      if (result.atsApiKey) {
        document.getElementById('apiKey').value = result.atsApiKey;
      }
    });

    // Save settings
    document.getElementById('saveBtn').addEventListener('click', () => {
      const apiKey = document.getElementById('apiKey').value;
      
      chrome.storage.sync.set({ atsApiKey: apiKey }, () => {
        const status = document.getElementById('status');
        status.textContent = 'Settings saved!';
        status.className = 'status success';
        status.style.display = 'block';
        
        setTimeout(() => {
          status.style.display = 'none';
        }, 2000);
      });
    });
  </script>
</body>
</html>
