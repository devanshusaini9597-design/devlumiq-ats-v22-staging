<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 340px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      background: #fafaf9;
      color: #1c1917;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 4px 0;
      color: #0f766e;
      font-weight: 700;
    }
    .sub {
      font-size: 11px;
      color: #78716c;
      margin-bottom: 14px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #57534e;
      margin-bottom: 4px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e7e5e4;
      border-radius: 8px;
      font-size: 13px;
      box-sizing: border-box;
      background: #fff;
    }
    input:focus {
      outline: none;
      border-color: #0d9488;
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0d9488;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #0f766e; }
    button.secondary {
      background: #fff;
      color: #0f766e;
      border: 1px solid #99f6e4;
      margin-top: 8px;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
    }
    .status.success { background: #d1fae5; color: #065f46; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .info {
      font-size: 11px;
      color: #78716c;
      margin-top: 12px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <h1>ATS LinkedIn Import</h1>
  <p class="sub">One-click import from LinkedIn profiles into your ATS.</p>

  <div class="form-group">
    <label for="atsDomain">ATS Domain</label>
    <input type="url" id="atsDomain" placeholder="https://your-ats.example.com" autocomplete="off">
  </div>

  <div class="form-group">
    <label for="apiKey">Extension API Key</label>
    <input type="password" id="apiKey" placeholder="Paste token from Settings → Extension" autocomplete="off">
  </div>

  <button type="button" id="saveBtn">Save Settings</button>
  <button type="button" id="validateBtn" class="secondary">Test Connection</button>

  <div id="status" class="status" style="display: none;"></div>

  <p class="info">
    Generate a token in your ATS under <strong>Settings → Chrome Extension</strong>.
    Then open any LinkedIn profile and click <strong>Import to ATS</strong>.
  </p>

  <script>
    function showStatus(msg, ok) {
      const status = document.getElementById('status');
      status.textContent = msg;
      status.className = 'status ' + (ok ? 'success' : 'error');
      status.style.display = 'block';
    }

    chrome.storage.sync.get(['atsDomain', 'atsApiKey'], (result) => {
      if (result.atsDomain) document.getElementById('atsDomain').value = result.atsDomain;
      if (result.atsApiKey) document.getElementById('apiKey').value = result.atsApiKey;
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      let domain = document.getElementById('atsDomain').value.trim().replace(/\/$/, '');
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!domain || !apiKey) {
        showStatus('Domain and API key are required', false);
        return;
      }
      if (!/^https?:\/\//i.test(domain)) domain = 'https://' + domain;
      chrome.storage.sync.set({ atsDomain: domain, atsApiKey: apiKey }, () => {
        showStatus('Settings saved!', true);
        setTimeout(() => { document.getElementById('status').style.display = 'none'; }, 2000);
      });
    });

    document.getElementById('validateBtn').addEventListener('click', () => {
      chrome.runtime.sendMessage({ type: 'VALIDATE_SETTINGS' }, (res) => {
        if (chrome.runtime.lastError) {
          showStatus(chrome.runtime.lastError.message, false);
          return;
        }
        if (res?.valid) showStatus('Connected successfully', true);
        else showStatus(res?.error || 'Connection failed', false);
      });
    });
  </script>
</body>
</html>
