name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "file:./dev.db"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production-1234567890"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npx vitest run --reporter=verbose
        env:
          DATABASE_URL: "file:./dev.db"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production-1234567890"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
